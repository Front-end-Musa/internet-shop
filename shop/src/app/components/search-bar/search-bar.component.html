<div class="container">
  <div class="search">
    <div class="search__wrapper">
      <input type="text" name="" id="search__input" placeholder="what are you looking for?" class="search__input" (change)="onChange.emit(getValue($event))" >
      <img src="../../../assets/images/search.svg" alt="search" aria-label="search">
    </div>
    <button class="search__button">
      <img src="../../../assets/images/search-bar.svg" alt="search" aria-label="search">
    </button>
  </div>
</div>
